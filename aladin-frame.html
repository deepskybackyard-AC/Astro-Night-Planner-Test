      if(measureMode&&external){if(!point){if(measureReadout)measureReadout.textContent=lang==='en'?'Coordinate could not be determined.':'Koordinate konnte nicht bestimmt werden.';return}measurePoints.push(point);if(measurePoints.length>2)measurePoints=[point];if(measurePoints.length===1&&measureReadout)measureReadout.textContent=lang==='en'?`Point 1: RA ${point.ra.toFixed(3)}°, Dec ${point.dec.toFixed(3)}°`:`Punkt 1: RA ${point.ra.toFixed(3)}°, Dec ${point.dec.toFixed(3)}°`;if(measurePoints.length===2){const distance=angularDistanceDeg(measurePoints[0],measurePoints[1]);const arcmin=distance*60;if(measureReadout)measureReadout.textContent=lang==='en'?`Distance: ${distance.toFixed(3)}° (${arcmin.toFixed(1)}′)`:`Abstand: ${distance.toFixed(3)}° (${arcmin.toFixed(1)}′)`}drawMeasure();event.stopPropagation();return}
      if(outlineMode&&external&&outlineModeSelect?.value==='points'){if(outlineSuppressClick){outlineSuppressClick=false;event.preventDefault();event.stopPropagation();return}if(point){outlinePoints.push(point);outlineClosed=false;updateOutlinePreview()}event.preventDefault();event.stopPropagation();return}
      const row=nearestCatalogObject(point);if(row){showObjectPopover(row,event);event.stopPropagation();}else if(popover){popover.style.display='none'}
    },true);

    window.addEventListener('message',event=>{if(event.origin!==location.origin)return;const type=event.data?.type;if(type==='anp-add-target-result'){const btn=document.getElementById('popoverTarget');if(btn){btn.disabled=false;btn.classList.add('target-success');btn.textContent=event.data.ok?L.targetDone:L.targetExists;window.setTimeout(()=>{btn.classList.remove('target-success');btn.textContent=L.target},2200)}return}if(type==='anp-overlay'){overlayState={...overlayState,...event.data};if(Number.isFinite(Number(event.data.targetRa)))overlayState.targetRa=Number(event.data.targetRa);if(Number.isFinite(Number(event.data.targetDec)))overlayState.targetDec=Number(event.data.targetDec);if(Number.isFinite(Number(event.data.frameRa))&&Number.isFinite(Number(event.data.frameDec)))frameCenter={ra:Number(event.data.frameRa),dec:Number(event.data.frameDec)};frameMoveMode=Boolean(event.data.frameMoveMode);document.body.classList.toggle('frame-move-mode',frameMoveMode);if(typeof overlayState.outlinePolygons==='string'){try{overlayState.outlinePolygons=JSON.parse(overlayState.outlinePolygons||'null')}catch{overlayState.outlinePolygons=null}}if(typeof overlayState.comparisonFrames==='string'){try{overlayState.comparisonFrames=JSON.parse(overlayState.comparisonFrames||'[]')}catch{overlayState.comparisonFrames=[]}}getOutline().then(item=>{userOutlinePolygons=item?.polygons||null;redraw();window.setTimeout(redraw,120);window.setTimeout(redraw,420);updateMoonMarker();});lastViewKey='';scheduleLabels();updateMoonMarker();return}if(type==='anp-frame-move-mode'){frameMoveMode=Boolean(event.data.enabled);document.body.classList.toggle('frame-move-mode',frameMoveMode);return}if(type==='anp-center-frame'&&viewer){let center=null;if(Number.isFinite(Number(event.data.ra))&&Number.isFinite(Number(event.data.dec)))center={ra:Number(event.data.ra),dec:Number(event.data.dec)};else center=selectedCatalogObject?{ra:selectedCatalogObject.ra,dec:selectedCatalogObject.dec}:viewCenter();if(center){frameCenter=center;frameMoveMode=false;document.body.classList.remove('frame-move-mode');redraw();window.setTimeout(redraw,80);parent.postMessage({type:'anp-frame-centered',ra:frameCenter.ra,dec:frameCenter.dec,objectId:event.data.objectId||overlayState.targetId,silent:Boolean(event.data.silent)},location.origin)}else parent.postMessage({type:'anp-frame-center-error'},location.origin)}});
    if(!Number.isFinite(ra)||!Number.isFinite(dec)){fail('Ungültige Objektkoordinaten.');return}
    const loadCatalog=async()=>{try{const response=await fetch('assets/catalog.generated.json',{cache:'force-cache'});if(response.ok)catalogRows=parseCatalog(await response.json())}catch{}finally{scheduleLabels()}};
    const start=()=>{try{viewer=A.aladin('#aladin-lite-div',{survey,target:`${ra} ${dec}`,fov:initialFov,projection:'TAN',cooFrame:'ICRS',showCooGrid:showEqGrid,showReticle:true,showZoomControl:true,showFullscreenControl:true,showLayersControl:true,showSimbadPointerControl:false,showCooGridControl:true,showShareControl:true,showGotoControl:true});applyNativeSurveyRendering();if(Number.isFinite(catalogRot))overlayState.objectRot=catalogRot;const recenter=()=>{try{viewer.gotoRaDec(ra,dec);viewer.setFoV(initialFov);applyNativeSurveyRendering(0);redraw();scheduleLabels();updateMoonMarker();loading.style.display='none';parent.postMessage({type:'anp-aladin-ready'},location.origin)}catch(e){fail(e.message||String(e))}};setTimeout(recenter,180);setTimeout(()=>{redraw();scheduleLabels();updateMoonMarker()},420);setTimeout(recenter,700);setTimeout(()=>{redraw();scheduleLabels();updateMoonMarker()},1250);setInterval(()=>{scheduleLabels();updateMoonMarker()},500);window.addEventListener('resize',()=>{updateMoonMarker();drawSkyOverlay()});loadCatalog();getOutline().then(item=>{userOutlinePolygons=item?.polygons||null;redraw();const r=document.getElementById('outlineReadout');if(r&&userOutlinePolygons)r.textContent=L.loaded})}catch(e){fail(e.message||String(e))}};
    if(window.A&&A.init&&typeof A.init.then==='function')A.init.then(start).catch(e=>fail(e.message||String(e)));else if(window.A)start();else fail('Bibliothek nicht verfügbar.');
  })();
