    const parseCatalog=rows=>(Array.isArray(rows)?rows:[]).map(r=>({id:r[0],name:r[1],aliases:Array.isArray(r[2])?r[2]:[],type:r[3],ra:Number(r[4])*15,dec:Number(r[5]),mag:r[6]==null?null:Number(r[6]),surface:r[7]==null?null:Number(r[7]),major:Number(r[8])||0,minor:Number(r[9])||0,constellation:r[10]||'–',filters:Array.isArray(r[11])?r[11]:[],catalogs:r[12]||[]})).filter(r=>r.id&&Number.isFinite(r.ra)&&Number.isFinite(r.dec));

    const updateLabels=()=>{if(!viewer||!window.A)return;const fov=viewer.getFov?.()||[initialFov],center=viewer.getRaDec?.()||[ra,dec],key=`${overlayState.showLabels}|${overlayState.labelDetail}|${Number(fov[0]||fov).toFixed(3)}|${Number(center[0]).toFixed(3)}|${Number(center[1]).toFixed(3)}`;if(key===lastViewKey)return;lastViewKey=key;

    const viewCenter=()=>{const center=viewer?.getRaDec?.();const centerRa=Number(center?.[0]??center?.ra??center?.lon),centerDec=Number(center?.[1]??center?.dec??center?.lat);return Number.isFinite(centerRa)&&Number.isFinite(centerDec)?{ra:centerRa,dec:centerDec}:null};

    const drawMeasure=()=>{if(!viewer||!window.A||!measureOverlay)return;try{measureOverlay.removeAll?.();if(measurePoints.length>=1){const a=measurePoints[0];measureOverlay.add(A.polygon(ellipsePolygon(a.ra,a.dec,0.06,0.06,0,32),{color:'#ffd66b',lineWidth:2,fillColor:'rgba(255,214,107,.25)'}));}if(measurePoints.length>=2){const b=measurePoints[1];measureOverlay.add(A.polygon(ellipsePolygon(b.ra,b.dec,0.06,0.06,0,32),{color:'#ffd66b',lineWidth:2,fillColor:'rgba(255,214,107,.25)'}));measureOverlay.add(A.polyline([[measurePoints[0].ra,measurePoints[0].dec],[b.ra,b.dec]],{color:'#ffd66b',lineWidth:3}));}}catch(e){console.warn('Messlinie konnte nicht gezeichnet werden',e)}};
    const drawOutlineDrawing=()=>{if(!viewer||!window.A||!outlineDrawingOverlay)return;try{outlineDrawingOverlay.removeAll?.();if(!outlinePoints.length)return;const markerSize=Math.max(0.04,Math.min(0.18,initialFov*0.012));outlinePoints.forEach((p,index)=>{outlineDrawingOverlay.add(A.polygon(ellipsePolygon(p.ra,p.dec,markerSize,markerSize,0,24),{color:'#4da3ff',lineWidth:2,fillColor:index===0?'rgba(255,214,107,.75)':'rgba(77,163,255,.65)'}));});if(outlinePoints.length>=2){const raw=outlinePoints.map(p=>[p.ra,p.dec]);outlineDrawingOverlay.add(A.polyline(raw,{color:'#4da3ff',lineWidth:3}));if(outlineClosed&&outlinePoints.length>=3)outlineDrawingOverlay.add(A.polyline([[outlinePoints[outlinePoints.length-1].ra,outlinePoints[outlinePoints.length-1].dec],[outlinePoints[0].ra,outlinePoints[0].dec]],{color:'#4da3ff',lineWidth:3}));}}catch(e){console.warn('Umrisszeichnung konnte nicht gezeichnet werden',e)}};
    const screenToWorld=(clientX,clientY)=>{const box=document.getElementById('aladin-lite-div').getBoundingClientRect(),x=clientX-box.left,y=clientY-box.top;try{const out=viewer?.pix2world?.(x,y)||viewer?.view?.pix2world?.(x,y);if(Array.isArray(out))return{ra:Number(out[0]),dec:Number(out[1])};if(out&&Number.isFinite(Number(out.ra)))return{ra:Number(out.ra),dec:Number(out.dec)}}catch{}return null};

    let outlineMode=false,outlineClosed=false,outlinePoints=[],freehandDrawing=false;
    const outlineModeSelect=document.getElementById('outlineMode'),outlineToggle=document.getElementById('outlineToggle'),outlineUndo=document.getElementById('outlineUndo'),outlineClose=document.getElementById('outlineClose'),outlineSave=document.getElementById('outlineSave'),outlineClear=document.getElementById('outlineClear'),outlineDeleteButton=document.getElementById('outlineDelete'),outlineReadout=document.getElementById('outlineReadout'),popover=document.getElementById('objectPopover');
    const updateOutlinePreview=()=>{if(outlinePoints.length>=3&&outlineClosed){userOutlinePolygons=[smoothClosedPolyline(outlinePoints)];}redraw();if(outlineReadout)outlineReadout.textContent=outlinePoints.length?`${outlinePoints.length} Stützpunkte${outlineClosed?' · geschlossen':''}`:'Umrisse werden lokal gespeichert.'};
    outlineToggle?.addEventListener('click',()=>{outlineMode=!outlineMode;measureMode=false;measureToggle?.classList.remove('active');outlineToggle.classList.toggle('active',outlineMode);outlineToggle.textContent=outlineMode?'Zeichnung aktiv':'Umriss zeichnen';if(outlineReadout)outlineReadout.textContent=outlineMode?'Punkte setzen oder Freihandlinie zeichnen.':'Umrisse werden lokal gespeichert.'});

    const nearestCatalogObject=point=>{if(!point||!catalogRows.length||!viewer)return null;const fov=viewer.getFov?.()||[initialFov];const threshold=Math.max(.03,Math.min(1.0,Number(fov[0]||fov)/35));let best=null;for(const row of catalogRows){const d=angleDistance(row.ra,row.dec,point.ra,point.dec);if(d<threshold&&(!best||d<best.distance))best={...row,distance:d}}return best};

    const showObjectPopover=(row,event)=>{if(!popover||!row)return;selectedCatalogObject=row;const extra=OBJECT_EXTRAS[row.id]||{};const commonName=extra.deName&&extra.enName?`${extra.deName} / ${extra.enName}`:(displayName(row)||L.none);popover.style.display='block';popover.style.left=`${Math.min(event.clientX+12,window.innerWidth-500)}px`;popover.style.top=`${Math.min(event.clientY+12,window.innerHeight-300)}px`;popover.innerHTML=`<button id="popoverClose" class="popover-close" type="button" aria-label="${L.closePopup}">×</button><h3>${L.objectInfo}</h3><strong>${objectTitle(row)}</strong><div class="muted">${row.type||'Objekt'} · ${prettyValue(row.constellation)}</div><dl class="object-info-grid"><dt>${L.commonName}</dt><dd>${commonName}</dd><dt>RA / Dec</dt><dd>${row.ra.toFixed(3)}° / ${row.dec.toFixed(3)}°</dd><dt>${L.size}</dt><dd>${formatSize(row)}</dd><dt>${L.magnitude}</dt><dd>${Number.isFinite(row.mag)?row.mag.toFixed(1):L.none}</dd><dt>${L.surface}</dt><dd>${Number.isFinite(row.surface)?row.surface.toFixed(1):L.none}</dd><dt>${L.distance}</dt><dd>${extra.distanceLy||L.none}</dd><dt>${L.filters}</dt><dd>${(row.filters||[]).join(', ')||L.none}</dd><dt>${L.catalogs}</dt><dd>${(row.catalogs||[]).join(', ')||'–'}</dd><dt>${L.aliases}</dt><dd>${aliasesText(row)}</dd></dl>${extra.description?`<div class="object-description">${extra.description}</div>`:''}<div class="actions"><button id="popoverFrame">${L.frame}</button><button id="popoverTarget">${L.target}</button><button id="popoverWiki">Wikipedia</button></div>`;document.getElementById('popoverClose')?.addEventListener('click',event=>{event.preventDefault();event.stopPropagation();popover.style.display='none';});document.getElementById('popoverFrame')?.addEventListener('click',event=>{event.preventDefault();event.stopPropagation();frameCenter={ra:row.ra,dec:row.dec};overlayState.targetId=row.id;overlayState.targetName=displayName(row)||row.id;overlayState.objectW=Math.max(.02,(Number(row.major)||1)/60);overla     const aladinDiv=document.getElementById('aladin-lite-div');

    aladinDiv.addEventListener('click',event=>{const point=screenToWorld(event.clientX,event.clientY);if(measureMode&&external){if(!point){if(measureReadout)measureReadout.textContent='Koordinate konnte nicht bestimmt werden.';return}measurePoints.push(point);if(measurePoints.length>2)measurePoints=[point];if(measurePoints.length===1&&measureReadout)measureReadout.textContent=`Punkt 1: RA ${point.ra.toFixed(3)}°, Dec ${point.dec.toFixed(3)}°`;if(measurePoints.length===2){const distance=angularDistanceDeg(measurePoints[0],measurePoints[1]);const arcmin=distance*60;if(measureReadout)measureReadout.textContent=`Abstand: ${distance.toFixed(3)}° (${arcmin.toFixed(1)}′)`}drawMeasure();event.stopPropagation();return}
