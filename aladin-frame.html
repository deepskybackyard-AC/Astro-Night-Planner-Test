<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Aladin Lite – Objektrahmung</title>
  <link rel="stylesheet" href="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.min.css">
  <style>
    html,body,#aladin-lite-div{width:100%;height:100%;margin:0;overflow:hidden;background:#02060b}
    #loading{position:absolute;z-index:20;left:50%;top:50%;transform:translate(-50%,-50%);padding:10px 14px;border-radius:9px;background:rgba(4,12,22,.9);color:#dcecff;font:14px system-ui,sans-serif;border:1px solid #29415f}
    #error{display:none;position:absolute;z-index:30;inset:12px auto auto 12px;max-width:calc(100% - 24px);padding:10px 12px;border-radius:9px;background:#301315;color:#ffdce1;font:14px system-ui,sans-serif;border:1px solid #9d4343}
  </style>
</head>
<body>
  <div id="aladin-lite-div"></div><div id="loading">Himmelsbild wird auf das Objekt zentriert …</div><div id="error"></div>
  <script src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js" charset="utf-8"></script>
  <script>
  (()=>{
    const params=new URLSearchParams(location.search),ra=Number(params.get('ra')),dec=Number(params.get('dec')),initialFov=Math.max(.02,Number(params.get('fov'))||2),survey=params.get('survey')||'P/DSS2/color';
    const loading=document.getElementById('loading'),error=document.getElementById('error');let viewer=null,overlay=null;
    let overlayState={frameW:Number(params.get('frameW'))||0,frameH:Number(params.get('frameH'))||0,frameRot:Number(params.get('frameRot'))||0,showFrame:params.get('showFrame')==='true',objectW:Number(params.get('objectW'))||0,objectH:Number(params.get('objectH'))||0,objectRot:Number(params.get('objectRot'))||0,showObject:params.get('showObject')==='true'};
    const fail=message=>{loading.style.display='none';error.textContent=`Aladin Lite konnte nicht geladen werden: ${message}`;error.style.display='block'};
    const skyPoint=(east,north)=>{const d2r=Math.PI/180,r2d=180/Math.PI,ra0=ra*d2r,dec0=dec*d2r,e=east*d2r,n=north*d2r,rho=Math.hypot(e,n);if(rho<1e-12)return[ra,dec];const bearing=Math.atan2(e,n),sinDec=Math.sin(dec0)*Math.cos(rho)+Math.cos(dec0)*Math.sin(rho)*Math.cos(bearing),outDec=Math.asin(Math.max(-1,Math.min(1,sinDec))),outRa=ra0+Math.atan2(Math.sin(bearing)*Math.sin(rho)*Math.cos(dec0),Math.cos(rho)-Math.sin(dec0)*Math.sin(outDec));return[((outRa*r2d)%360+360)%360,outDec*r2d]};
    const axes=angle=>{const rad=angle*Math.PI/180;return{ux:Math.sin(rad),uy:Math.cos(rad),vx:Math.cos(rad),vy:-Math.sin(rad)}};
    const rectangle=(width,height,rotation)=>{const {ux,uy,vx,vy}=axes(rotation),hw=width/2,hh=height/2;return [[-1,-1],[1,-1],[1,1],[-1,1]].map(([su,sv])=>skyPoint(su*hw*ux+sv*hh*vx,su*hw*uy+sv*hh*vy))};
    const ellipse=(width,height,rotation)=>{const {ux,uy,vx,vy}=axes(rotation),a=width/2,b=height/2,points=[];for(let i=0;i<=96;i++){const t=i/96*Math.PI*2,e=a*Math.cos(t),n=b*Math.sin(t);points.push(skyPoint(e*ux+n*vx,e*uy+n*vy))}return points};
    const redraw=()=>{if(!viewer||!window.A)return;try{if(overlay?.removeAll)overlay.removeAll();else{if(overlay&&viewer.removeOverlay)viewer.removeOverlay(overlay);overlay=null}if(!overlay){overlay=A.graphicOverlay({name:'Astro Night Planner',color:'#67cbff',lineWidth:2});viewer.addOverlay(overlay)}if(overlayState.showFrame&&overlayState.frameW>0&&overlayState.frameH>0)overlay.add(A.polygon(rectangle(overlayState.frameW,overlayState.frameH,overlayState.frameRot),{color:'#67cbff',lineWidth:2,fillColor:'rgba(40,183,215,.08)'}));if(overlayState.showObject&&overlayState.objectW>0&&overlayState.objectH>0)overlay.add(A.polyline(ellipse(overlayState.objectW,overlayState.objectH,overlayState.objectRot),{color:'#f0c75e',lineWidth:2}));}catch(e){console.warn('Overlay konnte nicht gezeichnet werden',e)}};
    window.addEventListener('message',event=>{if(event.origin!==location.origin||event.data?.type!=='anp-overlay')return;overlayState={...overlayState,...event.data};redraw()});
    if(!Number.isFinite(ra)||!Number.isFinite(dec)){fail('Ungültige Objektkoordinaten.');return}
    const start=()=>{try{viewer=A.aladin('#aladin-lite-div',{survey,target:`${ra} ${dec}`,fov:initialFov,projection:'TAN',cooFrame:'ICRS',showReticle:true,showZoomControl:true,showFullscreenControl:true,showLayersControl:true,showSimbadPointerControl:true,showCooGridControl:true,showShareControl:true,showGotoControl:true});const recenter=()=>{try{viewer.gotoRaDec(ra,dec);viewer.setFoV(initialFov);redraw();loading.style.display='none';parent.postMessage({type:'anp-aladin-ready'},location.origin)}catch(e){fail(e.message||String(e))}};setTimeout(recenter,180);setTimeout(recenter,700)}catch(e){fail(e.message||String(e))}};
    if(window.A&&A.init&&typeof A.init.then==='function')A.init.then(start).catch(e=>fail(e.message||String(e)));else if(window.A)start();else fail('Bibliothek nicht verfügbar.');
  })();
  </script>
</body>
</html>
