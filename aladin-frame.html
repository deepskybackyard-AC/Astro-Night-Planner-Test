    const outlineModeSelect=document.getElementById('outlineMode'),outlineToggle=document.getElementById('outlineToggle'),outlineUndo=document.getElementById('outlineUndo'),outlineClose=document.getElementById('outlineClose'),outlineSave=document.getElementById('outlineSave'),outlineClear=document.getElementById('outlineClear'),outlineReadout=document.getElementById('outlineReadout'),popover=document.getElementById('objectPopover');
    const updateOutlinePreview=()=>{if(outlinePoints.length>=2){userOutlinePolygons=[outlineClosed?outlinePoints.slice():outlinePoints.slice()];redraw();}else{redraw()}if(outlineReadout)outlineReadout.textContent=outlinePoints.length?`${outlinePoints.length} ${T.points}${outlineClosed?' · '+(uiLang==='en'?'closed':'geschlossen'):''}`:T.outlineSavedInfo};
    outlineToggle?.addEventListener('click',()=>{outlineMode=!outlineMode;measureMode=false;measureToggle?.classList.remove('active');outlineToggle.classList.toggle('active',outlineMode);outlineToggle.textContent=outlineMode?T.drawActive:T.drawOutline;if(outlineReadout)outlineReadout.textContent=outlineMode?T.drawHint:T.outlineSavedInfo});
    outlineUndo?.addEventListener('click',()=>{outlinePoints.pop();outlineClosed=false;updateOutlinePreview()});
    outlineClose?.addEventListener('click',()=>{if(outlinePoints.length>=3){outlineClosed=true;userOutlinePolygons=[smoothClosedPolyline(outlinePoints)];redraw();if(outlineReadout)outlineReadout.textContent=`${T.outlineClosed} · ${outlinePoints.length} ${T.points}`;}});
    outlineClear?.addEventListener('click',()=>{outlinePoints=[];outlineClosed=false;userOutlinePolygons=null;updateOutlinePreview()});
    outlineSave?.addEventListener('click',async()=>{const raw=outlinePoints.length>=3?outlinePoints:(userOutlinePolygons?.[0]||[]);if(raw.length<3){if(outlineReadout)outlineReadout.textContent=T.minPoints;return}const polygons=[smoothClosedPolyline(raw)];const ok=await putOutline(polygons,outlineModeSelect?.value||'points');if(ok){userOutlinePolygons=polygons;if(outlineReadout)outlineReadout.textContent=T.ownOutlineSaved;redraw();postHost({type:'anp-outline-saved',objectId:overlayState.targetId})}else if(outlineReadout)outlineReadout.textContent=T.outlineSaveError});
    const nearestCatalogObject=point=>{if(!point||!catalogRows.length||!viewer)return null;const fov=viewer.getFov?.()||[initialFov];const threshold=Math.max(.03,Math.min(1.0,Number(fov[0]||fov)/35));let best=null;for(const row of catalogRows){const d=angleDistance(row.ra,row.dec,point.ra,point.dec);if(d<threshold&&(!best||d<best.distance))best={...row,distance:d}}return best};
    const showObjectPopover=(row,event)=>{if(!popover||!row)return;selectedCatalogObject=row;popover.style.display='block';popover.style.left=`${Math.min(event.clientX+12,window.innerWidth-360)}px`;popover.style.top=`${Math.min(event.clientY+12,window.innerHeight-220)}px`;const missing=T.unknown;popover.innerHTML=`<h3>${T.objectInfo}</h3><strong>${row.id}${row.name&&row.name!==row.id?' · '+row.name:''}</strong><div class="muted">${row.type||T.object}${row.constellation?' · '+row.constellation:''} · RA ${row.ra.toFixed(3)}° · Dec ${row.dec.toFixed(3)}°</div><div>${T.size}: ${row.major?row.major.toFixed(0)+'′ × '+(row.minor||row.major).toFixed(0)+'′':missing} · Mag.: ${Number.isFinite(row.mag)?row.mag.toFixed(1):missing} · ${T.surface}: ${Number.isFinite(row.surface)?row.surface.toFixed(2):missing}</div><div>${T.filters}: ${(row.filters||[]).join(', ')||missing} · ${T.catalogs}: ${(row.catalogs||[]).join(', ')||'–'}</div>${row.aliases?.length?`<div>${T.aliases}: ${row.aliases.slice(0,4).join(', ')}</div>`:''}<div class="actions"><button id="popoverFrame">${T.frameOnObject}</button><button id="popoverTarget">${T.addTarget}</button><button id="popoverDetails">${T.details}</button></div>`;document.getElementById('popoverFrame')?.addEventListener('click',()=>{frameCenter={ra:row.ra,dec:row.dec};redraw();postHost({type:'anp-select-object',objectId:row.id});popover.style.display='none'});document.getElementById('popoverTarget')?.addEventListener('click',()=>{postHost({type:'anp-add-target',objectId:row.id});popover.style.display='none'});document.getElementById('popoverDetails')?.addEventListener('click',()=>{postHost({type:'anp-select-object',objectId:row.id});popover.style.display='none'});};
        const aladinDiv=document.getElementById('aladin-lite-div');
    aladinDiv.addEventListener('pointerdown',event=>{if(!external||!outlineMode||outlineModeSelect?.value!=='freehand')return;const point=screenToWorld(event.clientX,event.clientY);if(!point)return;freehandDrawing=true;outlineClosed=false;outlinePoints=[point];aladinDiv.setPointerCapture?.(event.pointerId);event.preventDefault();event.stopPropagation()},true);
    aladinDiv.addEventListener('pointermove',event=>{if(!freehandDrawing)return;const point=screenToWorld(event.clientX,event.clientY);if(!point)return;const last=outlinePoints[outlinePoints.length-1];if(!last||angularDistanceDeg(last,point)>.015){outlinePoints.push(point);updateOutlinePreview()}event.preventDefault();event.stopPropagation()},true);
    const stopFreehand=event=>{if(!freehandDrawing)return;freehandDrawing=false;outlineClosed=true;updateOutlinePreview();aladinDiv.releasePointerCapture?.(event.pointerId);event.preventDefault();event.stopPropagation()};aladinDiv.addEventListener('pointerup',stopFreehand,true);aladinDiv.addEventListener('pointercancel',stopFreehand,true);
    aladinDiv.addEventListener('click',event=>{const point=screenToWorld(event.clientX,event.clientY);if(measureMode&&external){if(!point){if(measureReadout)measureReadout.textContent=T.measureCoordError;return}measurePoints.push(point);if(measurePoints.length>2)measurePoints=[point];if(measurePoints.length===1&&measureReadout)measureReadout.textContent=`${T.point1}: RA ${point.ra.toFixed(3)}°, Dec ${point.dec.toFixed(3)}°`;if(measurePoints.length===2){const distance=angularDistanceDeg(measurePoints[0],measurePoints[1]);const arcmin=distance*60;if(measureReadout)measureReadout.textContent=`${T.distance}: ${distance.toFixed(3)}° (${arcmin.toFixed(1)}′)`}drawMeasure();event.stopPropagation();return}
      if(outlineMode&&external&&outlineModeSelect?.value==='points'){if(point){outlinePoints.push(point);outlineClosed=false;updateOutlinePreview()}event.stopPropagation();return}
      const row=nearestCatalogObject(point);if(row){showObjectPopover(row,event);event.stopPropagation();}else if(popover){popover.style.display='none'}
    },true);

    window.addEventListener('message',event=>{if(event.origin!==location.origin)return;const type=event.data?.type;if(type==='anp-overlay'){overlayState={...overlayState,...event.data};if(typeof overlayState.outlinePolygons==='string'){try{overlayState.outlinePolygons=JSON.parse(overlayState.outlinePolygons||'null')}catch{overlayState.outlinePolygons=null}}if(typeof overlayState.comparisonFrames==='string'){try{overlayState.comparisonFrames=JSON.parse(overlayState.comparisonFrames||'[]')}catch{overlayState.comparisonFrames=[]}}redraw();lastViewKey='';scheduleLabels();return}if(type==='anp-center-frame'&&viewer){const center=selectedCatalogObject?{ra:selectedCatalogObject.ra,dec:selectedCatalogObject.dec}:viewCenter();if(center){frameCenter=center;redraw();window.setTimeout(redraw,80);parent.postMessage({type:'anp-frame-centered',ra:frameCenter.ra,dec:frameCenter.dec},location.origin)}else parent.postMessage({type:'anp-frame-center-error'},location.origin)}});
    if(!Number.isFinite(ra)||!Number.isFinite(dec)){fail(uiLang==='en'?'Invalid object coordinates.':'Ungültige Objektkoordinaten.');return}
    const loadCatalog=async()=>{try{const response=await fetch('assets/catalog.generated.json',{cache:'force-cache'});if(response.ok)catalogRows=parseCatalog(await response.json())}catch{}finally{scheduleLabels()}};
    const start=()=>{try{viewer=A.aladin('#aladin-lite-div',{survey,target:`${ra} ${dec}`,fov:initialFov,projection:'TAN',cooFrame:'ICRS',showReticle:true,showZoomControl:true,showFullscreenControl:true,showLayersControl:true,showSimbadPointerControl:true,showCooGridControl:true,showShareControl:true,showGotoControl:true});applyNativeSurveyRendering();if(Number.isFinite(catalogRot))overlayState.objectRot=catalogRot;const recenter=()=>{try{viewer.gotoRaDec(ra,dec);viewer.setFoV(initialFov);applyNativeSurveyRendering(0);frameCenter={ra,dec};redraw();scheduleLabels();loading.style.display='none';parent.postMessage({type:'anp-aladin-ready'},location.origin)}catch(e){fail(e.message||String(e))}};setTimeout(recenter,180);setTimeout(()=>{redraw();scheduleLabels()},420);setTimeout(recenter,700);setTimeout(()=>{redraw();scheduleLabels()},1250);setInterval(scheduleLabels,500);loadCatalog();getOutline().then(item=>{userOutlinePolygons=item?.polygons||null;redraw();const r=document.getElementById('outlineReadout');if(r&&userOutlinePolygons)r.textContent=T.outlineSavedDb})}catch(e){fail(e.message||String(e))}};
    if(window.A&&A.init&&typeof A.init.then==='function')A.init.then(start).catch(e=>fail(e.message||String(e)));else if(window.A)start();else fail(uiLang==='en'?'Library not available.':'Bibliothek nicht verfügbar.');
  })();
  </script>
